<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillMatch — Home</title>
  <link rel="icon" href="img/iconSkillMatch.png" type="image/png">
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="/frontend/css/style.css" />
  
  <link rel="manifest" href="manifest.json" />
</head>
<body>
<div class="app-shell">

  <!-- Hero -->
  <div class="home-hero">

    <!-- Header -->
  <div class="app-header">
    <button onclick="api.logout()" class="btn btn-ghost btn-sm logout-btn">
      Sair
    </button>
  </div>
    <img src="/frontend/img/simbol-skillmatch-white 2.png" class="hero-bg-logo" alt="Logo fundo">
    <button onclick="location.href='pages/conta.html'" class="avatar" id="avatar-initials" style="border:none;background:none;cursor:pointer;padding:0">?</button>
    <div class="hero-text">
      <div class="name" id="user-name">Carregando...</div>
    </div>
    <p class="tagline">o <strong>match</strong> certo para a sua carreira.</p>
  </div>

  <!-- Ações principais -->
  <div class="home-actions pb-nav">
    <a href="pages/chat.html" class="btn btn-primary btn-large home-card" style="text-decoration:none">
      <span class="btn-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.56 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
      </span>
      <span>Gerar CV</span>
    </a>
    <a href="pages/perfil.html" class="btn btn-secondary btn-large home-card" style="text-decoration:none">
      <span class="btn-icon">
        <img src="img/anchor.png" alt="Ícone âncora" />
      </span>
      <span>Editar Perfil</span>
    </a>
    <a href="pages/historico.html" class="btn btn-history" style="text-decoration:none">
      Histórico de CVS
    </a>
  </div>
</div>

<!-- Nav inferior -->
<nav class="bottom-nav">
  <a href="app.html" class="active">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
    Home
  </a>
  <a href="pages/chat.html">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    Gerar CV
  </a>
  <a href="pages/historico.html">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    Histórico
  </a>
</nav>

<script src="js/api.js"></script>
<script>
  requireAuth();
  const user = api.getUser();
  const avatarEl = document.getElementById('avatar-initials');

  function restoreHomeAvatar() {
    const stored = localStorage.getItem('sm_avatar_image');
    if (stored) {
      avatarEl.style.backgroundImage = `url('${stored}')`;
      avatarEl.style.backgroundSize = 'cover';
      avatarEl.style.backgroundPosition = 'center';
      avatarEl.textContent = '';
    }
  }

  if (user) {
    document.getElementById('user-name').textContent = user.nome;
    avatarEl.textContent =
      user.nome.split(' ').map(n => n[0]).slice(0, 2).join('').toUpperCase();
  }

  restoreHomeAvatar();
</script>
</body>
</html>
